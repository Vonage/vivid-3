name: 🚀 Publish Icons

on:
  workflow_call:
    inputs:
      sha:
        description: The revision to build and publish
        required: true
        type: string

jobs:
  publish-icons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Get icons version from package.json
        id: get-icons-version
        run: |
          ICONS_VERSION=$(jq -r .version ./libs/icons/package.json)
          echo "icons_version=$ICONS_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish icons to CDN
        uses: ./.github/actions/upload-icons
        with:
          access-key: ${{ secrets.ICONS_S3_ACCESS_KEY }}
          secret-access-key: ${{ secrets.ICONS_S3_SECRET_ACCESS_KEY }}
          bucket: ${{ vars.ICONS_BUCKET }}
          base-folder: ${{ vars.ICONS_BASE_FOLDER }}
          version: ${{ steps.get-icons-version.outputs.icons_version }}
          source-dirs: |
            ./libs/icons/src/generated/
