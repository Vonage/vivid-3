name: 🚀 Publish Marketing Icons

on:
  workflow_call:
    inputs:
      sha:
        description: The revision to build and publish
        required: true
        type: string

jobs:
  publish-marketing-icons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch marketing icons from Figma
        run: pnpm --filter @vonage/vivid-marketing-icons run fetch
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}

      - name: Get marketing icons version from package.json
        id: get-version
        run: |
          VERSION=$(jq -r .version ./libs/marketing-icons/package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish marketing icons to CDN
        uses: ./.github/actions/upload-marketing-icons
        with:
          access-key: ${{ secrets.ICONS_S3_ACCESS_KEY }}
          secret-access-key: ${{ secrets.ICONS_S3_SECRET_ACCESS_KEY }}
          bucket: ${{ vars.ICONS_BUCKET }}
          base-folder: ${{ vars.ICONS_BASE_FOLDER }}
          version: ${{ steps.get-version.outputs.version }}
