name: 🚀 Publish Marketing Icons

on:
  workflow_call:
    inputs:
      sha:
        description: The revision to build and publish
        required: true
        type: string

jobs:
  publish-marketing-icons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Get marketing icons version from package.json
        id: get-marketing-icons-version
        run: |
          VERSION=$(jq -r .version ./libs/marketing-icons/package.json)
          echo "marketing_icons_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish marketing icons to CDN
        uses: ./.github/actions/upload-icons
        with:
          mode: marketing-icons
          access-key: ${{ secrets.ICONS_S3_ACCESS_KEY }}
          secret-access-key: ${{ secrets.ICONS_S3_SECRET_ACCESS_KEY }}
          bucket: ${{ vars.ICONS_BUCKET }}
          base-folder: ${{ vars.ICONS_BASE_FOLDER }}
          version: ${{ steps.get-marketing-icons-version.outputs.marketing_icons_version }}
          source-dir: ./libs/marketing-icons/src/generated/
