on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      force-release:
        description: 'Perform a release even if release-please did not create a new release'
        required: true
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

name: release-please
jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      vivid_release_created: ${{ steps.release.outputs['libs/components--release_created'] }}
      vivid_release_sha: ${{ steps.release.outputs['libs/components--sha'] }}

      vivid_icons_release_created: ${{ steps.release.outputs['libs/icons--release_created'] }}
      vivid_icons_version: ${{ steps.release.outputs['libs/icons--version'] }}
      vivid_icons_sha: ${{ steps.release.outputs['libs/icons--sha'] }}

      vivid_tokens_release_created: ${{ steps.release.outputs['libs/design-tokens--release_created'] }}
      vivid_tokens_version: ${{ steps.release.outputs['libs/design-tokens--version'] }}
      vivid_tokens_sha: ${{ steps.release.outputs['libs/design-tokens--sha'] }}

      eslint_plugin_release_created: ${{ steps.release.outputs['libs/eslint-plugin--release_created'] }}
      eslint_plugin_release_sha: ${{ steps.release.outputs['libs/eslint-plugin--sha'] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # Checks if a release PR has been merged but not released yet (label: `autorelease: pending`)
      # If so, creates releases (and tags) for the affected libraries in GitHub, updates the label, and sets the relevant outputs
      # release-please is configured to skip github-release creation for some of the packages. They are configured in the
      # "release-please-config.json" file in root directory. Skipped packages have "skip-github-release" option set to `true`.
      # However, release-please depends on the tags to understand what has changed, so we create it ourselves in the next step.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          # Defer creating a new release PR until after the vivid-vue tag is created
          # Otherwise, release-please will create a new pull request for the vivid-vue changes immediately
          skip-github-pull-request: true

      # Whenever the components are released, also create a tag for the vivid-vue library
      - name: Create Vivid Vue Tag
        if: ${{ steps.release.outputs['libs/components--release_created'] }}
        uses: ./.github/actions/create-version-tag
        with:
          sha: ${{ steps.release.outputs['libs/components--sha'] }}
          tag: vivid-vue
          version: ${{ steps.release.outputs['libs/components--version'] }}
          token: ${{ secrets.RELEASE_PLEASE_PAT }}

      # release-please checks whether changes has been made in the test-utils package. If so, release tag is created.
      - name: Create Test Utils Tag
        if: ${{ steps.release.outputs['libs/test-utils--release_created'] }}
        uses: ./.github/actions/create-version-tag
        with:
          sha: ${{ steps.release.outputs['libs/test-utils--sha'] }}
          tag: test-utils
          version: ${{ steps.release.outputs['libs/test-utils--version'] }}
          token: ${{ secrets.RELEASE_PLEASE_PAT }}

      # ...and the same for icons
      - name: Create Icons Tag
        if: ${{ steps.release.outputs['libs/icons--release_created'] }}
        uses: ./.github/actions/create-version-tag
        with:
          sha: ${{ steps.release.outputs['libs/icons--sha'] }}
          tag: vivid-icons
          version: ${{ steps.release.outputs['libs/icons--version'] }}
          token: ${{ secrets.RELEASE_PLEASE_PAT }}

      # Now we can create/update the release PR if needed
      # This will look for commits since the last release and associate them with libraries if files in the library
      # directories have changed. It will then create/update a release PR that updates the libraries changelog and versions
      # based on the conventional commit messages.
      - uses: googleapis/release-please-action@v4
        id: pull-request
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          skip-github-release: true

  should-release:
    runs-on: ubuntu-latest
    needs: release-please
    outputs:
      should_release: ${{ steps.should-release.outputs.should_release }}
      release_sha: ${{ steps.should-release.outputs.release_sha }}
      should_release_icons: ${{ steps.should-release.outputs.should_release_icons }}
      should_release_tokens: ${{ steps.should-release.outputs.should_release_tokens }}
    steps:
      - id: should-release
        run: |
          SHOULD_RELEASE="${{ needs.release-please.outputs.vivid_release_created == 'true' || needs.release-please.outputs.eslint_plugin_release_created == 'true' || github.event.inputs.force-release == 'true' }}"
          RELEASE_SHA="${{ needs.release-please.outputs.vivid_release_sha || needs.release-please.outputs.eslint_plugin_release_sha || github.event.pull_request.head.sha }}"
          SHOULD_RELEASE_ICONS="${{ needs.release-please.outputs.vivid_icons_release_created == 'true' || github.event.inputs.force-release == 'true' }}"
          SHOULD_RELEASE_TOKENS="${{ needs.release-please.outputs.vivid_tokens_release_created == 'true' || github.event.inputs.force-release == 'true' }}"
          {
            echo "should_release=$SHOULD_RELEASE"
            echo "release_sha=$RELEASE_SHA"
            echo "should_release_icons=$SHOULD_RELEASE_ICONS"
            echo "should_release_tokens=$SHOULD_RELEASE_TOKENS"
          } >> "$GITHUB_OUTPUT"

  vivid-publish:
    needs: should-release
    if: ${{ needs.should-release.outputs.should_release == 'true' }}
    uses: ./.github/workflows/_publish.yml
    with:
      path: ./libs/components/dist
      sha: ${{ needs.should-release.outputs.release_sha }}
    secrets: inherit

  vivid-design-tokens-publish:
    needs: should-release
    if: ${{ needs.should-release.outputs.should_release_tokens == 'true' }}
    uses: ./.github/workflows/_publish.yml
    with:
      path: ./libs/design-tokens
      sha: ${{ needs.should-release.outputs.release_sha }}
    secrets: inherit

  vivid-design-tokens-flutter-publish:
    needs: [should-release, release-please]
    if: ${{ needs.should-release.outputs.should_release_tokens == 'true' }}
    uses: ./.github/workflows/_publish-flutter.yml
    with:
      path: ./libs/design-tokens/flutter-dist
      sha: ${{ needs.should-release.outputs.release_sha }}
      version: ${{ needs.release-please.outputs.vivid_tokens_version }}
    secrets: inherit

  vivid-icons-publish:
    needs: should-release
    if: ${{ needs.should-release.outputs.should_release_icons == 'true' }}
    uses: ./.github/workflows/_publish-icons.yml
    with:
      sha: ${{ needs.should-release.outputs.release_sha }}
    secrets: inherit

  vivid-vue-publish:
    needs: should-release
    if: ${{ needs.should-release.outputs.should_release == 'true' }}
    uses: ./.github/workflows/_publish.yml
    with:
      path: ./libs/vue-wrappers
      sha: ${{ needs.should-release.outputs.release_sha }}
    secrets: inherit

  test-utils-publish:
    needs: should-release
    if: ${{ needs.should-release.outputs.should_release == 'true' }}
    uses: ./.github/workflows/_publish.yml
    with:
      path: ./libs/test-utils
      sha: ${{ needs.should-release.outputs.release_sha }}
    secrets: inherit

  eslint-plugin-publish:
    needs: should-release
    if: ${{ needs.should-release.outputs.should_release == 'true' }}
    uses: ./.github/workflows/_publish.yml
    with:
      path: ./libs/eslint-plugin
      sha: ${{ needs.should-release.outputs.release_sha }}
    secrets: inherit

  deploy-s3:
    needs: should-release
    if: ${{ needs.should-release.outputs.should_release == 'true' }}
    uses: ./.github/workflows/_deploy-s3.yml
    secrets: inherit
