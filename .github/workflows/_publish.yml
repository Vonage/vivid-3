name: 🚀 Publish Vivid

on:
  workflow_call:
    inputs:
      sha:
        description: The revision to build and publish
        required: true
        type: string
      path:
        description: The path to call npm publish on
        required: true
        type: string
      tag:
        required: false
        default: latest
        type: string
      version:
        description: If provided, updates the packages version before publishing.
        required: false
        default: ''
        type: string
    secrets:
      NPM_VVD_VNG_AUTOMATION_TOKEN:
        required: true
      VONAGE_ORG_ARTIFACTORY_SECRET:
        required: true

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Set version
        if: ${{ inputs.version != '' }}
        working-directory: ${{ inputs.path }}
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          echo "Version set to ${{ inputs.version }}"

      - name: Check if version is already published
        id: check
        run: |
          NAME=$(npm view ${{ inputs.path }} name)
          VERSION=$(npm view ${{ inputs.path }} version)
          if npm view "$NAME@$VERSION"; then
          echo "published=true" >> "$GITHUB_OUTPUT"
          else
          echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm registry
        if: steps.check.outputs.published == 'false'
        uses: Vonage/apeg-ci-cd/actions/internal/package-manager/pnpm/publish-package@ebab49941b4a5db4d5e220d954e7124bf3d20032
        with:
          registry-url: https://registry.npmjs.org/
          registry-auth-token: ${{ secrets.NPM_VVD_VNG_AUTOMATION_TOKEN }}
          working-directory: ${{ inputs.path }}
          pnpm-publish-args: --no-git-checks --tag ${{ inputs.tag }}

  artifactory-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Set version
        if: ${{ inputs.version != '' }}
        working-directory: ${{ inputs.path }}
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          echo "Version set to ${{ inputs.version }}"

      - name: Check if version is already published
        id: check
        run: |
          NAME=$(npm view ${{ inputs.path }} name)
          VERSION=$(npm view ${{ inputs.path }} version)
          if npm view "$NAME@$VERSION" --registry=https://eu-artifactory.vonage.cloud/artifactory/api/npm/npm-local/ "--//eu-artifactory.vonage.cloud/artifactory/api/npm/npm-local/:_authToken=$AUTH_TOKEN"; then
          echo "published=true" >> "$GITHUB_OUTPUT"
          else
          echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          AUTH_TOKEN: ${{ secrets.VONAGE_ORG_ARTIFACTORY_SECRET }}

      - name: Publish to Artifactory
        if: steps.check.outputs.published == 'false'
        uses: Vonage/apeg-ci-cd/actions/internal/package-manager/pnpm/publish-package@ebab49941b4a5db4d5e220d954e7124bf3d20032
        with:
          registry-url: https://eu-artifactory.vonage.cloud/artifactory/api/npm/npm-local/
          registry-auth-token: ${{ secrets.VONAGE_ORG_ARTIFACTORY_SECRET }}
          working-directory: ${{ inputs.path }}
          pnpm-publish-args: --no-git-checks --tag ${{ inputs.tag }}

  github-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Set version
        if: ${{ inputs.version != '' }}
        working-directory: ${{ inputs.path }}
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          echo "Version set to ${{ inputs.version }}"

      - name: Check if version is already published
        id: check
        run: |
          NAME=$(npm view ${{ inputs.path }} name)
          VERSION=$(npm view ${{ inputs.path }} version)
          if npm view "$NAME@$VERSION" --registry=https://npm.pkg.github.com "--//npm.pkg.github.com/:_authToken=$AUTH_TOKEN"; then
          echo "published=true" >> "$GITHUB_OUTPUT"
          else
          echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub registry
        if: steps.check.outputs.published == 'false'
        uses: Vonage/apeg-ci-cd/actions/internal/package-manager/pnpm/publish-package@ebab49941b4a5db4d5e220d954e7124bf3d20032
        with:
          registry-url: https://npm.pkg.github.com
          registry-auth-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: ${{ inputs.path }}
          pnpm-publish-args: --no-git-checks --tag ${{ inputs.tag }}
