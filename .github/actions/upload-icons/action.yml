name: vivid icons CDN upload
description: Uploads icon assets to Vivid's Icons AWS S3 bucket
branding:
  color: purple

inputs:
  access-key:
    description: S3 bucket Access Key
    required: true

  secret-access-key:
    description: S3 bucket Secret Access Key
    required: true

  version:
    description: icon set version
    required: true

  mode:
    description: Upload mode — 'icons' (default) or 'marketing-icons'
    required: false
    default: icons

  source-dir:
    description: Source directory containing index.json and icon files
    required: false

  bucket:
    description: Target S3 bucket name
    required: false

  base-folder:
    description: Root folder in the bucket where all assets live
    required: false

  region:
    description: S3 bucket region
    required: false

runs:
  using: node20
  main: dist/index.js
